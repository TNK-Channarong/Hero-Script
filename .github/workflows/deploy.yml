name: Deploy to Google Apps Script
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @google/clasp
      - run: echo '${{ secrets.CLASSP_RPC_JSON }}' > ~/.clasprc.json
      - run: clasp push --force